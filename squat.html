<!doctype html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Squat - Code Animation</title>
  <style>
    body{margin:0;display:grid;place-items:center;height:100vh;background:#0b1220;font-family:system-ui;}
    .card{width:420px;padding:18px;border-radius:22px;
      background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.10);
      box-shadow:0 18px 40px rgba(0,0,0,.35);}
    .row{display:flex;align-items:center;justify-content:space-between;color:#cbd5e1;margin-bottom:10px}
    canvas{width:100%;height:320px;display:block;border-radius:18px;background:rgba(255,255,255,.04)}
    .hint{color:#94a3b8;font-size:13px;margin-top:10px}
  </style>
</head>
<body>
  <div class="card">
    <div class="row">
      <div style="font-weight:700;color:#e2e8f0">Squat (kodla)</div>
      <div id="fps">-- fps</div>
    </div>
    <canvas id="c" width="800" height="600"></canvas>
    <div class="hint">Minimal rig + easing. 30–40 egzersiz için aynı sistem genişletilir.</div>
  </div>

<script>
const canvas = document.getElementById("c");
const ctx = canvas.getContext("2d");

function lerp(a,b,t){ return a+(b-a)*t; }
function easeInOut(t){
  return t<.5 ? 2*t*t : 1 - Math.pow(-2*t+2,2)/2;
}

function drawLine(a,b,w,alpha=1){
  ctx.globalAlpha=alpha;
  ctx.lineWidth=w;
  ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke();
  ctx.globalAlpha=1;
}
function dot(p,r,alpha=1){
  ctx.globalAlpha=alpha;
  ctx.beginPath(); ctx.arc(p.x,p.y,r,0,Math.PI*2); ctx.fill();
  ctx.globalAlpha=1;
}

let last = performance.now(), frames=0, acc=0;

function frame(now){
  const dt = now-last; last=now;
  frames++; acc+=dt;
  if(acc>500){
    document.getElementById("fps").textContent = Math.round(frames*1000/acc)+" fps";
    frames=0; acc=0;
  }

  // t: 0..1..0 loop (ping-pong)
  const speed = 1600;
  const raw = (now % speed) / speed;
  const ping = raw < 0.5 ? raw*2 : (1-raw)*2;   // 0->1->0
  const t = easeInOut(ping);

  // Clear
  ctx.clearRect(0,0,canvas.width,canvas.height);

  // Soft background
  ctx.fillStyle = "rgba(255,255,255,0.03)";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  // Ground
  ctx.strokeStyle = "rgba(255,255,255,0.12)";
  ctx.lineWidth = 6;
  ctx.beginPath();
  ctx.moveTo(140, 500);
  ctx.lineTo(660, 500);
  ctx.stroke();

  // Premium stroke style
  ctx.strokeStyle = "rgba(226,232,240,0.92)";
  ctx.fillStyle = "rgba(226,232,240,0.92)";
  ctx.lineCap = "round";
  ctx.lineJoin = "round";

  // Rig points (2D) - standing -> squat
  const cx = 380, baseY = 470;
  const depth = lerp(0, 90, t);
  const hipBack = lerp(0, 35, t);
  const torsoLean = lerp(0, 30, t);

  const ankle = {x: cx+130, y: baseY};
  const knee  = {x: cx+80,  y: baseY-90 + depth*0.6};
  const hip   = {x: cx+10-hipBack, y: baseY-230 + depth};

  const shoulder = {x: cx-10-hipBack*0.6 + torsoLean, y: baseY-420 + depth*0.6};
  const head = {x: shoulder.x-30, y: shoulder.y-85};

  const elbow = {x: shoulder.x+110, y: shoulder.y+20};
  const wrist = {x: shoulder.x+190, y: shoulder.y+35};

  const heel = {x: cx+95, y: baseY+5};
  const toe  = {x: cx+165, y: baseY+5};

  // Soft halo (premium)
  ctx.strokeStyle = "rgba(0,0,0,0.18)";
  drawLine(shoulder, hip, 22, 0.55);
  drawLine(hip, knee, 22, 0.55);
  drawLine(knee, ankle, 22, 0.55);
  drawLine(shoulder, elbow, 22, 0.55);
  drawLine(elbow, wrist, 22, 0.55);

  // Main figure
  ctx.strokeStyle = "rgba(226,232,240,0.95)";
  drawLine(shoulder, hip, 16);
  drawLine(hip, knee, 16);
  drawLine(knee, ankle, 16);
  drawLine(heel, toe, 12, 0.9);
  drawLine(shoulder, elbow, 14);
  drawLine(elbow, wrist, 14);
  drawLine(shoulder, head, 10);

  // Joints
  ctx.fillStyle = "rgba(226,232,240,0.95)";
  [shoulder, hip, knee, ankle, elbow, wrist].forEach(p => dot(p, 8));
  // Head
  ctx.fillStyle = "rgba(226,232,240,0.95)";
  dot(head, 24);

  requestAnimationFrame(frame);
}
requestAnimationFrame(frame);
</script>
</body>
</html>
