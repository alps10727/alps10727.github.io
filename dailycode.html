<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Daily Code | Nominal Network</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #172554, #020617);
      color: white;
      text-align: center;
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 24px 16px;
    }

    .logo {
      font-size: 28px;
      font-weight: bold;
      margin-top: 20px;
    }

    .card {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 20px;
      padding: 28px 18px;
      margin: 24px 0;
      box-shadow: 0 20px 50px rgba(0,0,0,0.35);
    }

    .label {
      color: #93c5fd;
      font-size: 15px;
      margin-bottom: 12px;
    }

    .code {
      font-size: 38px;
      font-weight: 900;
      letter-spacing: 3px;
      color: #facc15;
      background: rgba(0,0,0,0.35);
      padding: 18px;
      border-radius: 14px;
      user-select: all;
    }

    .note {
      color: #cbd5e1;
      font-size: 15px;
      line-height: 1.6;
      margin-top: 18px;
    }

    .ad-box {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 22px auto;
      min-height: 70px;
      overflow: hidden;
    }

    .native-ad {
      margin: 26px 0;
    }

    .btn {
      display: inline-block;
      margin-top: 20px;
      padding: 14px 22px;
      background: #2563eb;
      color: white;
      text-decoration: none;
      border-radius: 999px;
      font-weight: bold;
      border: none;
      cursor: pointer;
      font-size: 15px;
    }

    .btn:active {
      transform: scale(0.97);
    }

    footer {
      color: #94a3b8;
      font-size: 13px;
      margin: 30px 0 10px;
    }

    @media (max-width: 520px) {
      .code {
        font-size: 30px;
        letter-spacing: 2px;
      }

      .desktop-ad {
        display: none;
      }
    }

    @media (min-width: 521px) {
      .mobile-ad {
        display: none;
      }
    }
  </style>
</head>
<body>

  <div class="container">
    <div class="logo">Nominal Network</div>

    <div class="ad-box mobile-ad">
      <script>
        atOptions = {
          'key' : '95abe203998fea04a8ca5a6175edd55d',
          'format' : 'iframe',
          'height' : 50,
          'width' : 320,
          'params' : {}
        };
      </script>
      <script src="https://www.highperformanceformat.com/95abe203998fea04a8ca5a6175edd55d/invoke.js"></script>
    </div>

    <div class="ad-box desktop-ad">
      <script>
        atOptions = {
          'key' : 'a8d48182125dfe46aede2df382875f92',
          'format' : 'iframe',
          'height' : 60,
          'width' : 468,
          'params' : {}
        };
      </script>
      <script src="https://www.highperformanceformat.com/a8d48182125dfe46aede2df382875f92/invoke.js"></script>
    </div>

    <div class="card">
      <div class="label">Today's Daily Code</div>
      <div class="code" id="dailyCode">NOMINALIAN</div>

      <p class="note">
        Copy this code and enter it inside the Nominal Network app to claim your daily reward.
        Daily codes may change regularly, so make sure to check this page often.
      </p>

      <button class="btn" onclick="copyCode()">Copy Code</button>
    </div>

    <div class="native-ad">
      <script async="async" data-cfasync="false" src="https://pl29784144.effectivecpmnetwork.com/b0b7103bbd70c41e26937c271299e62d/invoke.js"></script>
      <div id="container-b0b7103bbd70c41e26937c271299e62d"></div>
    </div>

    <footer>
      © 2026 Nominal Network. Daily code page.
    </footer>
  </div>

  <script>
    function copyCode() {
      const code = document.getElementById("dailyCode").innerText;

      navigator.clipboard.writeText(code).then(function () {
        alert("Code copied: " + code);
      }).catch(function () {
        alert("Please copy the code manually: " + code);
      });
    }
  </script>

</body>
</html>
